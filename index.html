<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sano Bld</title>
    <link rel="icon" type="image/png" href="logo.png?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="adc52595-b992-434a-8eaf-2a4880979675"></script>
</head>
<body>

    <!-- ═══════════════════════════════════════════════════════
         PRELOADER — Split-Text (inchangé, pixel-perfect)
    ═══════════════════════════════════════════════════════ -->
    <div id="preloader" aria-hidden="true">
        <div class="pre-curtain pre-curtain-top"></div>
        <div class="pre-curtain pre-curtain-bot"></div>
        <div id="pre-text-wrap">
            <span class="pre-text pre-text-top" id="pre-text-top" aria-hidden="true"></span>
            <span class="pre-text pre-text-bot" id="pre-text-bot" aria-hidden="true"></span>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         CURSEUR GHOST — cercle mix-blend-mode:difference
         S'agrandit sur le titre actif → "VOIR LE PROJET"
    ═══════════════════════════════════════════════════════ -->
    <div id="cursor-ghost" aria-hidden="true">
        <span class="cursor-text">VOIR LE PROJET</span>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         HUD — 4 coins internes du viewport
         Opacité 20% → 100% au survol
    ═══════════════════════════════════════════════════════ -->

    <!-- Haut-Gauche : Logo -->
    <div class="hud hud-tl">
        <a href="#" class="hud-logo" aria-label="Sano Bld — accueil">Sano Bld</a>
    </div>

    <!-- Haut-Droite : Contrôles -->
    <div class="hud hud-tr">
        <button id="lang-toggle"  class="hud-btn" aria-label="Basculer la langue">EN</button>
        <button id="theme-toggle" class="hud-btn" aria-label="Basculer le thème">◐</button>
    </div>

    <!-- Bas-Gauche : Index + Catégorie -->
    <div class="hud hud-bl">
        <span id="hud-index" class="hud-index">[01 // 14]</span>
    </div>

    <!-- Bas-Droite : Vues + Horloge -->
    <div class="hud hud-br">
        <span id="hud-views" class="hud-meta">—</span>
        <span id="hud-time"  class="hud-meta">00:00:00</span>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SCENE — galerie verticale snap
         Slides générés dynamiquement par script.js
    ═══════════════════════════════════════════════════════ -->
    <main id="scene" role="main" aria-label="Galerie de projets"></main>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
